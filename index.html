<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symbiosis Admission Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Internal CSS -->
<style>
  .brand-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-header .logo-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(192, 57, 43, 0.3);
  }

  .brand-header .logo-badge svg {
    width: 28px;
    height: 28px;
    fill: white;
  }

  .brand-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1a1a2e;
    margin: 0 0 6px 0;
    letter-spacing: -0.3px;
  }

  .brand-header p {
    font-size: 13px;
    color: #8a8fa8;
    margin: 0;
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .form-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }

  .form-divider span {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #b0b5c8;
    font-weight: 500;
    white-space: nowrap;
  }

  .form-divider::before,
  .form-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e8eaf0;
  }
</style>
</head>
<body>

<div class="page-bg"></div>

<div class="outer-wrapper">
  <div class="container">

    <div class="brand-header">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
        </svg>
      </div>
      <h1>Symbiosis University</h1>
      <p>Admission Registration Portal · 2025–26</p>
    </div>

    <form id="admissionForm" novalidate>

      <!-- Personal Info Section -->
      <div class="form-divider"><span>Personal Information</span></div>

      <div class="form-row two-col">
        <div class="form-group">
          <label for="name">Full Name <span class="req">*</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            <input type="text" id="name" placeholder="e.g. Aman Sharma" autocomplete="name">
          </div>
          <span class="field-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth <span class="req">*</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.9 3 3 3.9 3 5v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H5V8h14v13z"/></svg>
            <input type="date" id="dob">
          </div>
          <span class="field-error" id="dobError"></span>
        </div>
      </div>

      <div class="form-row two-col">
        <div class="form-group">
          <label for="email">Email Address <span class="req">*</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number <span class="req">*</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
            <input type="tel" id="phone" placeholder="10-digit mobile number" maxlength="10" autocomplete="tel">
          </div>
          <span class="field-error" id="phoneError"></span>
        </div>
      </div>

      <!-- Gender -->
      <div class="form-group">
        <label>Gender <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-card">
            <input type="radio" name="gender" value="Male">
            <span class="radio-label">
              <span class="radio-icon">♂</span> Male
            </span>
          </label>
          <label class="radio-card">
            <input type="radio" name="gender" value="Female">
            <span class="radio-label">
              <span class="radio-icon">♀</span> Female
            </span>
          </label>
          <label class="radio-card">
            <input type="radio" name="gender" value="Other">
            <span class="radio-label">
              <span class="radio-icon">⚧</span> Other
            </span>
          </label>
        </div>
        <span class="field-error" id="genderError"></span>
      </div>

      <!-- Address -->
      <div class="form-group">
        <label for="address">Residential Address <span class="req">*</span></label>
        <div class="input-wrapper">
          <textarea id="address" rows="3" placeholder="Street, Area, Landmark..."></textarea>
        </div>
        <span class="field-error" id="addressError"></span>
      </div>

      <!-- Academic Section -->
      <div class="form-divider"><span>Academic Preferences</span></div>

      <div class="form-row two-col">
        <div class="form-group">
          <label for="course">Course <span class="req">*</span></label>
          <div class="input-wrapper select-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
            <select id="course">
              <option value="">Select your course</option>
              <option value="BCA">BCA – Bachelor of Computer Applications</option>
              <option value="BBA">BBA – Bachelor of Business Administration</option>
              <option value="MCA">MCA – Master of Computer Applications</option>
              <option value="MBA">MBA – Master of Business Administration</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
          </div>
          <span class="field-error" id="courseError"></span>
        </div>

        <div class="form-group">
          <label for="city">Preferred Campus City <span class="req">*</span></label>
          <div class="input-wrapper select-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <select id="city">
              <option value="">Select campus city</option>
              <option value="Pune">Pune</option>
              <option value="Mumbai">Mumbai</option>
              <option value="Delhi">Delhi</option>
              <option value="Bangalore">Bangalore</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
          </div>
          <span class="field-error" id="cityError"></span>
        </div>
      </div>

      <!-- Security Section -->
      <div class="form-divider"><span>Account Security</span></div>

      <div class="form-row two-col">
        <div class="form-group">
          <label for="password">Password <span class="req">*</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <input type="password" id="password" placeholder="Min. 6 characters">
            <button type="button" class="toggle-pw" data-target="password" title="Show/hide password">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
          <div class="password-strength" id="pwStrength" style="display:none">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password <span class="req">*</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <input type="password" id="confirmPassword" placeholder="Re-enter your password">
            <button type="button" class="toggle-pw" data-target="confirmPassword" title="Show/hide password">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
          <span class="field-error" id="confirmPasswordError"></span>
        </div>
      </div>

      <!-- Terms -->
      <div class="terms-block">
        <label class="checkbox-label">
          <input type="checkbox" id="terms">
          <span class="custom-checkbox"></span>
          <span>I have read and agree to the <a href="#" class="link">Terms & Conditions</a> and <a href="#" class="link">Privacy Policy</a> of Symbiosis University.</span>
        </label>
        <span class="field-error" id="termsError"></span>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Submit Application</span>
        <span class="btn-arrow">→</span>
      </button>

      <div id="successMsg" class="success-msg" style="display:none">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Registration Successful! Your application has been received.
      </div>

    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
